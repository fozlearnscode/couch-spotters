name: Update Overhead Status

on:
  schedule:
    # Every 15 minutes — flight positions go stale fast, unlike YouTube
    # streams. No API key needed (OpenSky anonymous access), so this is
    # just about picking a cadence that's fresh without being excessive.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-overhead:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch OpenSky data and write overhead-status.json
        run: node scripts/update-overhead.js

      - name: Commit updated overhead-status.json
        run: |
          git config user.name "couch-spotters-bot"
          git config user.email "actions@github.com"
          git add overhead-status.json
          git diff --quiet --cached || git commit -m "Update overhead status [automated]"
          git push
          
