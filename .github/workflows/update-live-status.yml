name: Update Live Status

on:
  schedule:
    # Every 2 hours = 12 runs/day = ~6,000 units (5 search.list calls/run
    # at 100 units each, same 2 general + 3 airport queries as before).
    # Leaves ~4,000 units of daily headroom for manual workflow_dispatch
    # runs or troubleshooting without any risk of hitting quota again.
    - cron: '0 */2 * * *'
  workflow_dispatch: {} # trigger manually from the Actions tab any time

permissions:
  contents: write

jobs:
  update-live-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run live search and write live-status.json
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/update-live-status.js

      - name: Commit updated live-status.json
        run: |
          git config user.name "couch-spotters-bot"
          git config user.email "actions@github.com"
          git add live-status.json
          git diff --quiet --cached || git commit -m "Update live status [automated]"
          git push
